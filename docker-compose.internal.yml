version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: privacy-first-api
    env_file:
      - .env
    environment:
      PORT: 7071
    ports:
      - "7071:7071"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: privacy-first-frontend
    environment:
      NEXT_PUBLIC_AGENT_API_BASE_URL: http://localhost:7071
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
