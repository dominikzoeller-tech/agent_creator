services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: privacy-first-api
    env_file:
      - .env
    environment:
      PORT: 7071
    ports:
      - "7071:7071"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:7071/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AGENT_API_BASE_URL: http://localhost:7071
    container_name: privacy-first-frontend
    environment:
      NEXT_PUBLIC_AGENT_API_BASE_URL: http://localhost:7071
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
